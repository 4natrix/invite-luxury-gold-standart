<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Артем & Елизавета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
}

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:
  linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.8)),
  url('https://images.unsplash.com/photo-1520857014576-2c4f4c972b57?auto=format&fit=crop&w=1500&q=80') center/cover;
}

.names{
  font-family:'Cormorant Garamond';
  font-size:60px;
}

.date{
  color:#d4af37;
}

.timer{
  padding:80px 20px;
  text-align:center;
}

.timer div{
  display:inline-block;
  margin:10px;
}

.map iframe{
  width:100%;
  height:300px;
  border:0;
}

.music{
  position:fixed;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<section class="hero">
  <div>
    <div class="names">Артем & Елизавета</div>
    <div class="date">5 СЕНТЯБРЯ 2026</div>
  </div>
</section>

<section class="timer">
  <h2>До свадьбы</h2>
  <div id="d"></div>
  <div id="h"></div>
  <div id="m"></div>
  <div id="s"></div>
</section>

<section>
  <h2 style="text-align:center;">Место</h2>
  <p style="text-align:center;">Grand Hall, Астана</p>

  <div class="map">
    <iframe src="https://yandex.ru/map-widget/v1/?um=constructor%3A8b8"></iframe>
  </div>
</section>

<div class="music">
  <button onclick="a.play()">🎵</button>
  <audio id="a" src="https://assets.mixkit.co/music/493/493.mp3"></audio>
</div>

<script>
const date=new Date("2026-09-05").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=date-now;
document.getElementById('d').innerHTML=Math.floor(d/(1000*60*60*24));
document.getElementById('h').innerHTML=Math.floor((d%(1000*60*60*24))/(1000*60*60));
document.getElementById('m').innerHTML=Math.floor((d%(1000*60*60))/(1000*60));
document.getElementById('s').innerHTML=Math.floor((d%(1000*60))/1000);
},1000);
</script>

</body>
</html>
